name: Cache Update

on:
  schedule:
    - cron: '*/30 * * * *'  # every 30 minutes
  workflow_dispatch:
    inputs:
      backfill_limit:
        description: 'Matches per surface for backfill (default 30)'
        required: false
        default: '30'

concurrency:
  group: cache-update
  cancel-in-progress: false  # queue rather than cancel — avoids partial cache writes

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env.local
        run: |
          echo "RAPIDAPI_KEY=${{ secrets.RAPIDAPI_KEY }}" > .env.local
          echo "RAPIDAPI_HOST=tennisapi1.p.rapidapi.com" >> .env.local

      - name: Prefetch fixtures (past 2 days + today + 6 days ahead)
        run: node scripts/prefetch-fixtures.js 6 --past=2 || true

      - name: Rebuild player indexes
        run: node scripts/prebuild-cache.js today || true

      - name: Backfill match history for top players
        run: node scripts/backfill-history.js --limit=${{ github.event.inputs.backfill_limit || '30' }} || true

      - name: Prebuild match stats
        run: node scripts/prebuild-match-stats.js upcoming || true

      - name: Repair missing indexes and stats
        run: node scripts/repair-upcoming.js || true

      - name: Sanity check — catch bias and low coverage, auto-repair
        run: node scripts/sanity-check.js || true

      - name: Validate stats — flag and re-fetch suspicious averages
        run: node scripts/validate-stats.js || true

      - name: Commit and push
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cache/ app/api/cache/
          git diff --staged --quiet && echo "Nothing to commit" || git commit -m "Cache update $(date -u +%Y-%m-%dT%H:%M)"
          git push
