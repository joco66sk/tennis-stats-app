name: Daily Cache Update

on:
  schedule:
    - cron: '0 21 * * *'  # 23:00 CEST — once daily after evening matches
  workflow_dispatch:         # allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env.local
        run: |
          echo "RAPIDAPI_KEY=${{ secrets.RAPIDAPI_KEY }}" > .env.local
          echo "RAPIDAPI_HOST=tennis-api-atp-wta-itf.p.rapidapi.com" >> .env.local

      - name: Prefetch fixtures (past 7 days + today + 14 days ahead)
        run: node scripts/prefetch-fixtures.js 14 --past=7

      - name: Rebuild player indexes
        run: node scripts/prebuild-cache.js today

      - name: Prebuild match stats
        run: node scripts/prebuild-match-stats.js upcoming

      - name: Verify upcoming fixtures
        run: |
          for i in $(seq 0 14); do
            DATE=$(TZ=Europe/Paris date -d "+${i} days" +%Y-%m-%d)
            FILE="cache/fixtures-${DATE}.json"
            [ -f "$FILE" ] && node scripts/verify-fixtures.js $DATE || true
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cache/ app/api/cache/
          git diff --staged --quiet && echo "Nothing to commit" || git commit -m "Daily cache update $(date -u +%Y-%m-%d)"
          git push
