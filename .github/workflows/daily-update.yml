name: Daily Cache Update

on:
  schedule:
    - cron: '0 7 * * *'   #  9:00 CEST — full rebuild (indexes + stats)
    - cron: '0 11 * * *'  # 13:00 CEST — fixture refresh + new-player catch-up
    - cron: '0 15 * * *'  # 17:00 CEST — fixture refresh + new-player catch-up
    - cron: '0 19 * * *'  # 21:00 CEST — full rebuild (indexes + stats)
  workflow_dispatch:         # allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env.local
        run: |
          echo "RAPIDAPI_KEY=${{ secrets.RAPIDAPI_KEY }}" > .env.local
          echo "RAPIDAPI_HOST=tennis-api-atp-wta-itf.p.rapidapi.com" >> .env.local

      - name: Prefetch fixtures (past 7 days + today + 3 days)
        run: node scripts/prefetch-fixtures.js 3 --past=7

      - name: Rebuild player indexes
        run: node scripts/prebuild-cache.js today

      - name: Prebuild match stats
        run: node scripts/prebuild-match-stats.js upcoming

      - name: Verify upcoming fixtures
        run: |
          TODAY=$(TZ=Europe/Paris date +%Y-%m-%d)
          TOMORROW=$(TZ=Europe/Paris date -d tomorrow +%Y-%m-%d)
          node scripts/verify-fixtures.js $TODAY || true
          [ -f cache/fixtures-${TOMORROW}.json ] && node scripts/verify-fixtures.js $TOMORROW || true

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cache/ app/api/cache/
          git diff --staged --quiet && echo "Nothing to commit" || git commit -m "Daily cache update $(date -u +%Y-%m-%d)"
          git push
