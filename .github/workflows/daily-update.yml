name: Daily Cache Update

on:
  schedule:
    - cron: '45 19 * * *'  # 21:45 CET (UTC+2 summer)
  workflow_dispatch:         # allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env.local
        run: |
          echo "RAPIDAPI_KEY=${{ secrets.RAPIDAPI_KEY }}" > .env.local
          echo "RAPIDAPI_HOST=tennis-api-atp-wta-itf.p.rapidapi.com" >> .env.local

      - name: Prefetch fixtures (today + 3 days)
        run: node scripts/prefetch-fixtures.js 3

      - name: Rebuild player indexes
        run: node scripts/prebuild-cache.js today

      - name: Prebuild match stats
        run: node scripts/prebuild-match-stats.js upcoming --clay-only

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cache/ app/api/cache/
          git diff --staged --quiet && echo "Nothing to commit" || git commit -m "Daily cache update $(date -u +%Y-%m-%d)"
          git push
