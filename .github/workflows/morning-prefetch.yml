name: Morning Fixture Refresh

on:
  schedule:
    - cron: '0 4 * * *'  # 06:00 CEST — catches matches added after nightly build
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env.local
        run: |
          echo "RAPIDAPI_KEY=${{ secrets.RAPIDAPI_KEY }}" > .env.local
          echo "RAPIDAPI_HOST=tennis-api-atp-wta-itf.p.rapidapi.com" >> .env.local

      - name: Prefetch today + tomorrow fixtures
        run: node scripts/prefetch-fixtures.js 2 --past=0 || true

      - name: Repair missing indexes and stats for new players
        run: node scripts/repair-upcoming.js || true

      - name: Sanity check — fetch any missing stats files
        run: node scripts/sanity-check.js || true

      - name: Commit and push
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cache/ app/api/cache/
          git diff --staged --quiet && echo "Nothing to commit" || git commit -m "Morning fixture refresh $(date -u +%Y-%m-%d)"
          git push
